name: Daily Finance Pulse

on:
  schedule:
    # GitHub cron is in UTC. 10:00 UTC is about 6am US Eastern in summer (EDT),
    # 5am in winter (EST). Adjust the hour to match your wake time.
    # Runs Monday through Friday only.
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python generate.py

      - name: Commit and publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Episode $(date -u +%F)" || echo "No changes to commit"
          git push
